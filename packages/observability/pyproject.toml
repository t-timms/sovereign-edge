[project]
name = "sovereign-edge-observability"
version = "0.3.9"
requires-python = ">=3.11"
dependencies = [
    "sovereign-edge-core",
    "structlog>=24.4,<26.0",
]

[tool.uv.sources]
sovereign-edge-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/observability"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
