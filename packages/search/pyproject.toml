[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sovereign-edge-search"
version = "0.3.0"
description = "Free web grounding: Jina search/reader, arXiv, HuggingFace papers, Bible API"
requires-python = ">=3.11"
dependencies = [
    "sovereign-edge-core",
    "httpx>=0.27,<1.0",
    "defusedxml>=0.7,<1.0",
]

[tool.uv.sources]
sovereign-edge-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/search"]
