[project]
name = "sovereign-edge-llm"
version = "0.3.0"
requires-python = ">=3.11"
dependencies = [
    "sovereign-edge-core",
    "litellm==1.82.6",  # PINNED — 1.82.7/1.82.8 are compromised
    "instructor>=1.0.0,<2.0.0",
]

[tool.uv.sources]
sovereign-edge-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/llm"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
