[project]
name = "sovereign-edge-router"
version = "0.3.7"
requires-python = ">=3.11"
dependencies = [
    "sovereign-edge-core",
    "sovereign-edge-memory",
    "onnxruntime>=1.19,<2.0",
    "transformers>=4.48,<5.0",
    "numpy>=1.26,<3.0",
]

[tool.uv.sources]
sovereign-edge-core = { workspace = true }
sovereign-edge-memory = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/router"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
