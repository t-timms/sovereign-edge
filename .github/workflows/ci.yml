name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-packages
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  type-check:
    name: Type Check
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-packages
      - run: uv run mypy --ignore-missing-imports packages/ agents/ services/

  security:
    name: Security
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --all-packages
      - run: uv pip install pip-audit bandit
      - name: Audit dependencies for CVEs
        # cryptography 46.0.6 → 46.0.7: minor fix, upgrade when ready
        # langchain-core 1.2.27 → 1.2.28: minor fix, upgrade when ready
        # pydantic-ai 0.0.30 → 1.56.0: major bump, ignore until stable migration
        # pypdf 4.3.1 → 6.x: major bump (14 CVEs), ignore until migration
        # transformers 4.57.6 → 5.0.0rc3: pre-release only, ignore
        run: >
          uv run pip-audit
          --skip-editable
          --ignore-vuln CVE-2026-39892
          --ignore-vuln CVE-2026-33699
          --ignore-vuln GHSA-926x-3r5x-gfhw
          --ignore-vuln CVE-2026-25580
          --ignore-vuln CVE-2025-55197
          --ignore-vuln CVE-2025-62707
          --ignore-vuln CVE-2025-62708
          --ignore-vuln CVE-2025-66019
          --ignore-vuln CVE-2026-22690
          --ignore-vuln CVE-2026-22691
          --ignore-vuln CVE-2026-24688
          --ignore-vuln CVE-2026-27026
          --ignore-vuln CVE-2026-27024
          --ignore-vuln CVE-2026-27025
          --ignore-vuln CVE-2026-27628
          --ignore-vuln CVE-2026-27888
          --ignore-vuln CVE-2026-28351
          --ignore-vuln CVE-2026-28804
          --ignore-vuln CVE-2026-31826
          --ignore-vuln CVE-2026-33123
          --ignore-vuln CVE-2026-1839
      - name: Static security analysis
        run: uv run bandit -r packages/ agents/ services/ -ll --quiet --skip B314,B324,B104,B108,B615

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: [type-check, security]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-packages
      - name: Run tests with coverage
        run: >
          uv run pytest -v --tb=short -x
          --cov=packages --cov=agents --cov=services
          --cov-report=term-missing
          --cov-fail-under=50
          --ignore=evals
          --ignore=agents/creative/tests
          --ignore=agents/spiritual/tests
          --ignore=packages/observability/tests
          --junitxml=test-results.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml
