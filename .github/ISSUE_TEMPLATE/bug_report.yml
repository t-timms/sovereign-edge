name: Bug Report
description: Something is broken or behaving unexpectedly
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Fill in as much as you can — logs are the most useful thing you can provide.

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Jetson Orin (ARM64, JetPack 6)
        - Linux ARM64 (other)
        - Linux x86_64
        - WSL2 (Windows)
      default: 0
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: "3.11.x"
    validations:
      required: true

  - type: input
    id: package_version
    attributes:
      label: Package version
      description: Run `uv run python -c "import importlib.metadata; print(importlib.metadata.version('sovereign-edge-core'))"`
      placeholder: "0.3.x"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Send message "..."
        2. See error in logs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "`journalctl -u telegram-bot --since today` or paste the traceback"
      render: shell
