version: "3.9"

# ============================================================
# Sovereign Edge — Jetson edge deployment override
#
# Usage (combines with base docker-compose.yml):
#   docker compose -f docker-compose.yml -f docker-compose.jetson.yml up -d
#
# Requirements on host:
#   - NVIDIA Container Toolkit (JetPack ships this)
#   - Docker runtime set to nvidia:
#       sudo nvidia-ctk runtime configure --runtime=docker
#       sudo systemctl restart docker
# ============================================================

services:

  sovereign-edge:
    # Jetson resource constraints — 8 GB unified memory shared with GPU
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "0.8"       # 80 % CPU quota across cores
        reservations:
          memory: 512M
    environment:
      # Inform the app it is running on the edge node
      SE_DEPLOYMENT_ENV: jetson

  ollama:
    # Give Ollama the NVIDIA runtime so it can use the Jetson GPU
    runtime: nvidia
    deploy:
      resources:
        limits:
          memory: 4G          # leave headroom for the bot process
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Flash Attention reduces KV cache memory on compatible Jetson models
      OLLAMA_FLASH_ATTENTION: "1"
      # Allow 2 concurrent requests; 2 loaded models (LLM + embedder)
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_MAX_LOADED_MODELS: "2"
      # Queue up to 10 requests before dropping (morning brief fan-out)
      OLLAMA_MAX_QUEUE: "10"
